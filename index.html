<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        body { margin: 0; background: transparent; display: flex; justify-content: center; overflow: hidden; }
        #main { width: 100%; height: 200px; max-width: 800px; }
    </style>
</head>
<body>
    <div id="main"></div>
    <script type="text/javascript">
    const chartDom = document.getElementById('main');
    const myChart = echarts.init(chartDom);

    // DATA_START
        const mockData = [["2026-04-05", 11]];
        // DATA_END

    const option = {
        tooltip: {
            formatter: function (p) {
                return p.value[0] + ' : ' + p.value[1] + ' 个任务';
            }
        },
        visualMap: {
            show: false,
            min: 0,
            max: 6, // 超过 6 的都会显示为最深色
            type: 'continuous', // 改为连续型，兼容性更强
            inRange: {
                color: [
                    '#f0f2f0', '#d9e2d5', '#b9c7b6', 
                    '#9aa995', '#7a8b75', '#5b6d56', '#3e4d3a'
                ]
            }
        },
        calendar: {
            top: 40,
            left: 50,
            right: 10,
            cellSize: ['auto', 13],
            range: '2026', // <--- 再次确认这里是 2026
            itemStyle: {
                borderWidth: 2,
                borderColor: '#fff',
                borderRadius: 4
            },
            yearLabel: { show: false },
            dayLabel: { nameMap: ['日', '一', '二', '三', '四', '五', '六'], firstDay: 1 },
            monthLabel: { nameMap: 'cn' }
        },
        series: {
            type: 'heatmap',
            coordinateSystem: 'calendar',
            data: mockData
        }
    };

    myChart.setOption(option);
    </script>
</body>
</html>
