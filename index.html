<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>SJTU 816 Heatmap</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        /* 适配 Notion 背景，确保在深色/浅色模式下都有良好的视觉效果 */
        body { 
            margin: 0; 
            background: transparent; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            overflow: hidden; 
        }
        #main { 
            width: 100%; 
            height: 200px; 
            max-width: 800px; 
        }
    </style>
</head>
<body>
    <div id="main"></div>
    <script type="text/javascript">
        const chartDom = document.getElementById('main');
        const myChart = echarts.init(chartDom);

        // --- 数据区 ---
        // 确保日期格式为 YYYY-MM-DD
        // DATA_START
        const mockData = [];
        // DATA_END

        const option = {
            tooltip: {
                trigger: 'item',
                formatter: function (p) {
                    return p.value[0] + ' : ' + p.value[1] + ' 个任务';
                }
            },
            visualMap: {
                show: false,
                min: 0,
                max: 6, 
                type: 'piecewise',
                // 定义 7 个颜色阶段 (0, 1, 2, 3, 4, 5, 6+)
                inRange: {
                    color: [
                        '#ebedf0', // 0: 默认底色
                        '#c6e48b', // 1
                        '#a1d99b', // 2
                        '#74c476', // 3
                        '#41ab5d', // 4
                        '#238b45', // 5
                        '#005a32'  // 6+: 极致深绿
                    ]
                },
                // 关键点：数值超过 max 时强制匹配深绿色
                outOfRange: {
                    color: '#005a32'
                }
            },
            calendar: {
                top: 30,
                left: 40,
                right: 10,
                cellSize: ['auto', 13],
                range: '2026', // 简写，匹配 2026 全年
                splitLine: { show: false }, 
                itemStyle: {
                    color: '#ebedf0', 
                    borderWidth: 2,
                    borderColor: '#fff',
                    borderRadius: 2
                },
                yearLabel: { show: false },
                dayLabel: { 
                    nameMap: ['日', '一', '二', '三', '四', '五', '六'], 
                    firstDay: 1, 
                    color: '#999',
                    fontSize: 11
                },
                monthLabel: { 
                    nameMap: 'cn', 
                    color: '#999',
                    fontSize: 11
                }
            },
            series: {
                type: 'heatmap',
                coordinateSystem: 'calendar',
                // 修复点：直接使用原始数据，不进行字符串替换，防止日期解析偏离
                data: mockData
            }
        };

        myChart.setOption(option);

        // 自动适配 Notion 窗口宽度
        window.onresize = function() {
            myChart.resize();
        };
    </script>
</body>
</html>
