<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>SJTU 816 Heatmap</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        /* 适配 Notion Embed 透明背景 */
        body { margin: 0; background: transparent; display: flex; justify-content: center; overflow: hidden; }
        #main { width: 100%; height: 200px; max-width: 850px; }
    </style>
</head>
<body>
    <div id="main"></div>
    <script type="text/javascript">
        const chartDom = document.getElementById('main');
        const myChart = echarts.init(chartDom);

        // DATA_START
        const mockData = [["2026-04-05", 11]]; 
        // DATA_END

        const option = {
            tooltip: {
                formatter: function (p) {
                    return p.value[0] + ' : ' + p.value[1] + ' 个任务';
                }
            },
            visualMap: {
                show: false,
                min: 0,
                max: 6, // 6及以上自动映射到最后一个颜色
                type: 'piecewise',
                // 定义 6 个等级的莫兰迪绿
                splitNumber: 6,
                inRange: {
                    color: [
                        '#ebedf0', // 0: 浅灰色底格
                        '#c6e48b', // 1: 浅绿
                        '#a1d99b', // 2: 豆绿
                        '#74c476', // 3: 迷迭香绿
                        '#41ab5d', // 4: 森林绿
                        '#238b45', // 5: 深绿
                        '#005a32'  // 6+: 极致深绿 (上岸绿)
                    ]
                }
            },
            calendar: {
                top: 40,
                left: 45,
                right: 10,
                cellSize: ['auto', 13],
                range: '2026',
                splitLine: { show: false }, // 移除月份黑框
                itemStyle: {
                    color: '#ebedf0', // 默认底色：浅灰色
                    borderWidth: 2,
                    borderColor: '#fff',
                    borderRadius: 3   // 微圆角，更精致
                },
                yearLabel: { show: false },
                dayLabel: { 
                    nameMap: ['日', '一', '二', '三', '四', '五', '六'], 
                    firstDay: 1, 
                    color: '#999',
                    fontSize: 12
                },
                monthLabel: { 
                    nameMap: 'cn', 
                    color: '#999',
                    fontSize: 12
                }
            },
            series: {
                type: 'heatmap',
                coordinateSystem: 'calendar',
                data: mockData.map(function (item) {
        return [item[0].replace(/-/g, '/'), item[1]]; 
    })
            }
        };

        myChart.setOption(option);

        // 自动适配窗口大小
        window.onresize = function() {
            myChart.resize();
        };
    </script>
</body>
</html>
