<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        body { margin: 0; background: transparent; display: flex; justify-content: center; overflow: hidden; }
        #main { width: 100%; height: 200px; max-width: 800px; }
    </style>
</head>
<body>
    <div id="main"></div>
    <script>
        var chartDom = document.getElementById('main');
        var myChart = echarts.init(chartDom);
        
        // DATA_START
        const mockData = [["2026-04-05", 11]];
        // DATA_END

        const option = {
           visualMap: {
            min: 0,
            max: 5, // 0到5次，共6个阶梯
            type: 'piecewise',
            orient: 'horizontal',
            left: 'center',
            top: 10,
            itemWidth: 14,
            itemHeight: 14,
            textStyle: { 
                color: '#8e9e94', // 莫兰迪灰绿文字
                fontSize: 12 
            },
            // 莫兰迪色系：低饱和度、灰调、高级绿
            inRange: {
                color: [
                    '#f0f2f0', // 0次：极浅灰绿（几乎白色，作为底色）
                    '#d9e2d5', // 1次：豆灰绿
                    '#b9c7b6', // 2次：灰艾绿
                    '#9aa995', // 3次：迷迭香绿
                    '#7a8b75', // 4次：森林灰绿
                    '#5b6d56'  // 5次：深苔藓绿（考研上岸绿！）
                ]
            }
        },
            calendar: {
                top: 40, left: 30, right: 10,
                range: '2026',
                cellSize: ['auto', 13],
                splitLine: { show: false },
                itemStyle: { color: '#f1f1f1', borderWidth: 2, borderColor: '#fff' },
                yearLabel: { show: false },
                dayLabel: { firstDay: 1, nameMap: 'cn', fontSize: 10, color: '#ccc' },
                monthLabel: { nameMap: 'cn', fontSize: 10, color: '#999' }
            },
            series: {
            type: 'heatmap',
            coordinateSystem: 'calendar',
            data: mockData,
            itemStyle: {
                color: '#f0f2f0', // 默认底色
                borderWidth: 2,
                borderColor: '#fff', // 方块间的白色空隙
                borderRadius: 4      // 添加 4px 圆角，方块会变圆润
            }
        }
        };
        myChart.setOption(option);
        // 自动适配窗口大小
        window.onresize = function() { myChart.resize(); };
    </script>
</body>
</html>
