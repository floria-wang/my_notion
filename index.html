<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>SJTU 816 Heatmap</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        /* 适配 Notion 背景，确保在深色/浅色模式下都有良好的视觉效果 */
        body { 
            margin: 0; 
            background: transparent; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            overflow: hidden; 
        }
        #main { 
            width: 100%; 
            height: 200px; 
            max-width: 800px; 
        }
    </style>
</head>
<body>
    <div id="main"></div>
    <script type="text/javascript">
        const chartDom = document.getElementById('main');
        const myChart = echarts.init(chartDom);

        // --- 数据区 ---
        // 确保日期格式为 YYYY-MM-DD
        // DATA_START
        const mockData = [["2026-04-09", 1], ["2026-04-01", 1], ["2026-04-27", 5], ["2026-03-31", 3], ["2026-04-11", 1], ["2026-04-07", 1], ["2026-04-12", 1], ["2026-04-06", 1], ["2026-04-03", 1], ["2026-04-02", 1], ["2026-04-14", 1]];
        // DATA_END

        const option = {
            tooltip: {
                trigger: 'item',
                formatter: function (p) {
                    return p.value[0] + ' : ' + p.value[1] + ' 个任务';
                }
            },
       visualMap: {
            show: false,
            type: 'piecewise',
            // 手动定义每一级的区间
            pieces: [
                { min: 6, label: '6+ 次', color: '#005a32' }, // 6次及以上（上岸绿）
                { min: 5, max: 5, label: '5 次', color: '#238b45' },
                { min: 4, max: 4, label: '4 次', color: '#41ab5d' },
                { min: 3, max: 3, label: '3 次', color: '#74c476' },
                { min: 2, max: 2, label: '2 次', color: '#a1d99b' },
                { min: 1, max: 1, label: '1 次', color: '#c6e48b' },
                { value: 0, label: '无数据', color: '#ebedf0' } // 0次底色
            ],
            outOfRange: {
                color: '#ebedf0' // 万一数据异常，显示底色
            }
        },
            calendar: {
                top: 30,
                left: 40,
                right: 10,
                cellSize: ['auto', 13],
                range: '2026', // 简写，匹配 2026 全年
                splitLine: { show: false }, 
                itemStyle: {
                    color: '#ebedf0', 
                    borderWidth: 2,
                    borderColor: '#fff',
                    borderRadius: 2
                },
                yearLabel: { show: false },
                dayLabel: { 
                    nameMap: ['日', '一', '二', '三', '四', '五', '六'], 
                    firstDay: 1, 
                    color: '#999',
                    fontSize: 11
                },
                monthLabel: { 
                    nameMap: 'cn', 
                    color: '#999',
                    fontSize: 11
                }
            },
            series: {
                type: 'heatmap',
                coordinateSystem: 'calendar',
                // 修复点：直接使用原始数据，不进行字符串替换，防止日期解析偏离
                data: mockData
            }
        };

        myChart.setOption(option);

        // 自动适配 Notion 窗口宽度
        window.onresize = function() {
            myChart.resize();
        };
    </script>
</body>
</html>
