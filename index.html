<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        body { margin: 0; background: transparent; display: flex; justify-content: center; overflow: hidden; }
        #main { width: 100%; height: 200px; max-width: 800px; }
    </style>
</head>
<body>
    <div id="main"></div>
    <script type="text/javascript">
        const chartDom = document.getElementById('main');
        const myChart = echarts.init(chartDom);

    // DATA_START
        const mockData = [["2026-04-05", 11]];
        // DATA_END

        const option = {
            tooltip: {
                formatter: function (p) {
                    return p.value[0] + ' : ' + p.value[1] + ' 个任务';
                }
            },
            visualMap: {
                show: false,
                min: 0,
                max: 6,
                type: 'piecewise',
                inRange: {
                    color: [
                        '#f0f2f0', // 0次
                        '#d9e2d5', // 1次
                        '#b9c7b6', // 2次
                        '#9aa995', // 3次
                        '#7a8b75', // 4次
                        '#5b6d56', // 5次
                        '#3e4d3a'  // 6次及以上
                    ]
                }
            },
            calendar: {
                top: 40,
                left: 40,
                right: 10,
                cellSize: ['auto', 12],
                range: '2026',
                itemStyle: {
                    borderWidth: 2,
                    borderColor: '#fff' // 只有方块间的白线，没有大边框
                },
                splitLine: { show: false }, // 彻底关掉那个烦人的黑色月份框
                yearLabel: { show: false },
                dayLabel: { nameMap: ['日', '一', '二', '三', '四', '五', '六'], firstDay: 1, color: '#999' },
                monthLabel: { nameMap: 'cn', color: '#999' }
            },
            series: {
                type: 'heatmap',
                coordinateSystem: 'calendar',
                data: mockData
            }
        };

        myChart.setOption(option);
    </script>
</body>
</html>
