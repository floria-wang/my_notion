<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        body { margin: 0; background: transparent; display: flex; justify-content: center; overflow: hidden; }
        #main { width: 100%; height: 200px; max-width: 800px; }
    </style>
</head>
<body>
    <div id="main"></div>
    <script>
        var chartDom = document.getElementById('main');
        var myChart = echarts.init(chartDom);
        
        // DATA_START
        const mockData = [["2026-04-05", 11]];
        // DATA_END

        const option = {
           visualMap: {
            show: false, // 依然隐藏顶部的颜色索引
            min: 0,
            max: 6,      // 调整最大值为 6（代表 6 次及以上）
            type: 'piecewise',
            inRange: {
                color: [
                    '#f0f2f0', // 0次：底面灰
                    '#d9e2d5', // 1次：豆灰绿
                    '#b9c7b6', // 2次：灰艾绿
                    '#9aa995', // 3次：迷迭香绿
                    '#7a8b75', // 4次：森林灰绿
                    '#5b6d56', // 5次：深苔藓绿
                    '#3e4d3a'  // 6次及以上：极深灰绿（这就是你要的终极颜色）
                ]
            }
        },
            calendar: {
                top: 40, left: 30, right: 10,
                range: '2026',
                cellSize: ['auto', 13],
                splitLine: { show: false },
                itemStyle: { color: '#f1f1f1', borderWidth: 2, borderColor: '#fff' },
                yearLabel: { show: false },
                dayLabel: { firstDay: 1, nameMap: 'cn', fontSize: 10, color: '#ccc' },
                monthLabel: { nameMap: 'cn', fontSize: 10, color: '#999' }
            },
            series: {
            type: 'heatmap',
            coordinateSystem: 'calendar',
            data: mockData,
            itemStyle: {
                color: '#f0f2f0', // 默认底色
                borderWidth: 2,
                borderColor: '#fff', // 方块间的白色空隙
                borderRadius: 4      // 添加 4px 圆角，方块会变圆润
            }
        }
        };
        myChart.setOption(option);
        // 自动适配窗口大小
        window.onresize = function() { myChart.resize(); };
    </script>
</body>
</html>
